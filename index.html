<!DOCTYPE html>
<html lang="af">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Opkas</title>
  <meta name="theme-color" content="#001845" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="api-modal" class="backdrop" hidden>
    <div class="dialog" role="dialog" aria-labelledby="modal-title">
      <h2 id="modal-title">Instellings</h2>
      <p>
        Stel jou Blink <strong>lees-alleen</strong> API-sleutel. Skep een op die
        <a href="https://dashboard.blink.sv/" target="_blank" rel="noopener">Blink-paneelbord</a>,
        meld aan, gebruik dan <strong>API Keys</strong> in die linkerkieslys en skep 'n sleutel met slegs <strong>Read</strong>-toegang.
      </p>
      <label for="api-key-input">API-sleutel</label>
      <input id="api-key-input" type="password" autocomplete="off" placeholder="Los leeg om bestaande te behou" />
      <label for="comment-server-input">Kommentaarbediener (opsioneel)</label>
      <input id="comment-server-input" type="text" autocomplete="off" placeholder="bv. https://comment.example.com" />
      <div id="modal-err" class="err" hidden></div>
      <div class="actions">
        <button type="button" class="secondary" id="modal-cancel">Kanselleer</button>
        <button type="button" id="modal-save">Stoor</button>
      </div>
    </div>
  </div>

  <header>
    <h1>Transaksies</h1>
    <div class="header-actions">
      <button type="button" class="ghost" id="settings">Instellings</button>
    </div>
  </header>
  <main id="app">
    <div class="toolbar">
      <div>
        <label for="day" id="day-label">Dag</label>
        <input id="day" type="date" />
      </div>
      <div id="day-to-wrap" hidden>
        <label for="day-to">Tot</label>
        <input id="day-to" type="date" />
      </div>
      <div class="multi-day-wrap">
        <label for="multi-day"><input id="multi-day" type="checkbox" /> Meerdere dae</label>
      </div>
      <div>
        <button type="button" id="fetch">Transaksies oproep</button>
      </div>
    </div>
    <div class="summary" id="summary" hidden></div>
    <div id="warnings" hidden></div>
    <div class="err" id="fetch-err" hidden></div>
    <ul class="tx-list" id="list"></ul>
    <p class="empty" id="empty">Kies datums en klik op "Transaksies oproep".</p>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
