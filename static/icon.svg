<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#003399"/>
      <stop offset="100%" stop-color="#001845"/>
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g filter="url(#shadow)" stroke="#f47920" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vector ? (circle + vertical stroke) to avoid font fallback -->
    <circle cx="256" cy="256" r="140" fill="none" stroke-width="34"/>
    <line x1="256" y1="92" x2="256" y2="420" stroke-width="34"/>
  </g>
</svg>
